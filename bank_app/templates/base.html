<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Secure Bank MITM Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f5f5; }
    .container { max-width: 800px; margin: auto; background: #fff; padding: 1.5rem; border-radius: 8px; }
    form { margin-bottom: 1.5rem; padding: 1rem; border: 1px solid #ccc; border-radius: 6px; background: #fafafa; }
    input[type=text], input[type=password], input[type=number] {
      width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; box-sizing: border-box;
    }
    button { padding: 0.5rem 1rem; }
    .flash { color: #b00020; margin-bottom: 0.5rem; }
    .section-title { margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Secure Bank – MITM / TLS Demo</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
        <p class="flash">{{ m }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
